[tool.ruff]
# Set the maximum line length
line-length = 100

# Target Python version
target-version = "py312"

[tool.ruff.lint]
# Enable standard pycodestyle (E, W), Pyflakes (F), and Isort (I) rules
select = ["E", "F", "I", "W"]

# Do not complain about print statements or unused imports in migrations
ignore = []

[tool.ruff.lint.per-file-ignores]
"**/migrations/*" = ["E501"]
"manage.py" = ["E501"]
