repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version
    rev: v0.4.4
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix]
      # Run the formatter
      - id: ruff-format

  - repo: local
    hooks:
      - id: oxfmt
        name: oxfmt Formatter (0xfmt)
        entry: npx oxfmt --write --no-error-on-unmatched-pattern
        language: system
        types: [file]
        files: \.(js|ts|jsx|tsx|css|html|json)$
        exclude: ^(node_modules/|\.venv/|venv/|frontend/dist/|staticfiles/|notebook_app/migrations/)
        pass_filenames: true
